<!--
  模板C：产品展示 (product)
  适用场景：电商 / 消费品
  配色：渐变背景，金色强调 #c9a96e
  特点：底部产品信息卡片
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#1a1a2e 100%);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#info{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-size:11px;pointer-events:none}
#brand{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:1px;pointer-events:none}
/* 产品信息卡片 */
#product-card{position:absolute;top:50%;right:32px;transform:translateY(-50%);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(201,169,110,0.3);border-radius:12px;padding:20px;color:#fff;max-width:200px;pointer-events:none}
#product-card h3{font-size:14px;color:#c9a96e;margin-bottom:8px}
#product-card p{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.5}
</style>
</head>
<body>
<!-- INJECT: three.js importmap + scene setup + GLB data -->
<div id="info">拖拽旋转 | 滚轮缩放 | 右键平移</div>
<div id="brand">3D Presenter</div>
</body>
</html>
